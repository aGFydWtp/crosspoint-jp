name: Compile Release
on:
  push:
    tags:
      - '*'
  # 手動実行: v<platformio.iniのversion>-forked.<N> を自動採番して
  # リリースを作成する (タグは softprops/action-gh-release が作る)。
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Install PlatformIO Core
        run: uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Determine release tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            # 既存の v<base>-forked / v<base>-forked.<N> タグから次の連番を採番
            # --no-recurse-submodules: open-x4-sdk への再帰 fetch が
            # "not our ref" で失敗するため (タグ取得に submodule は不要)
            git fetch --tags --quiet --no-recurse-submodules origin
            BASE="v$(sed -n 's/^version = //p' platformio.ini | tr -d '[:space:]')"
            LAST=$(git tag -l "${BASE}-forked" "${BASE}-forked.*" \
              | sed -e "s/^${BASE}-forked//" -e 's/^\.//' -e 's/^$/0/' \
              | sort -n | tail -n1)
            TAG="${BASE}-forked.$(( ${LAST:-0} + 1 ))"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Release tag: ${TAG}"

      - name: Sync version from tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          sed -i "s/^version = .*/version = ${VERSION}/" platformio.ini
          echo "Building with version: ${VERSION}"

      - name: Build CrossPoint
        run: |
          set -euo pipefail
          pio run -e gh_release

          firmware="$(find .pio/build -maxdepth 3 -type f -path "*/firmware.bin" | grep "/gh_release/" | head -n1)"
          bootloader="$(find .pio/build -maxdepth 3 -type f -path "*/bootloader.bin" | grep "/gh_release/" | head -n1)"
          partitions="$(find .pio/build -maxdepth 3 -type f -path "*/partitions.bin" | grep "/gh_release/" | head -n1)"

          if [ -z "${firmware}" ] || [ -z "${bootloader}" ] || [ -z "${partitions}" ]; then
            echo "Expected gh_release artifacts not found."
            find .pio/build -maxdepth 4 -type f | sort || true
            exit 1
          fi

          cp "${firmware}" firmware.bin
          cp "${bootloader}" bootloader.bin
          cp "${partitions}" partitions.bin

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CrossPoint-${{ steps.tag.outputs.tag }}
          path: |
            bootloader.bin
            partitions.bin
            firmware.bin

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: CrossPoint Reader JP ${{ steps.tag.outputs.tag }}
          files: |
            firmware.bin
            bootloader.bin
            partitions.bin
          # body はヘッダーとして使われ、generate_release_notes が有効な場合は
          # その下に GitHub が自動生成する変更点 (マージされた PR の一覧 / 新規 contributor /
          # Full Changelog リンク) が追記される。
          body: |
            ## CrossPoint Reader JP ${{ steps.tag.outputs.tag }}

            ### 📦 ファームウェア

            | ファイル | 言語 |
            |---------|------|
            | `firmware.bin` | 日本語 / English |

            ### 📥 インストール方法

            1. USB-C でデバイスをPCに接続
            2. `firmware.bin` をダウンロードし、フラッシュツールで書き込み
          generate_release_notes: true
          # ハイフン入りタグは prerelease 扱いだが、フォーク運用の
          # vX.Y.Z-forked / vX.Y.Z-forked.N は正式リリース (Deploy Flasher
          # の stable チャンネルが非 prerelease のみを拾うため)。
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') && !contains(steps.tag.outputs.tag, '-forked') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
